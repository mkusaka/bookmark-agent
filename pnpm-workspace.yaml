packages:
  - .
minimumReleaseAge: 10080
minimumReleaseAgeStrict: true
strictDepBuilds: true
trustPolicy: no-downgrade
blockExoticSubdeps: true
trustPolicyExclude:
  - 'reselect@5.1.1'
allowBuilds:
  '@google/genai': false
  esbuild: true
  protobufjs: false
  sharp: true
minimumReleaseAgeExclude:
